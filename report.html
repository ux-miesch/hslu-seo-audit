<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Audit Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0; }

    :root {
      --cyan:    #77C5D8;
      --green:   #ADCA2A;
      --yellow:  #FCC300;
      --magenta: #EE6A87;
      --black:   #1a1a1a;
      --grey:    #f4f4f4;
      --border:  #e0e0e0;
    }

    body {
      font-family: Verdana, Geneva, sans-serif;
      font-size: 13px;
      color: var(--black);
      background: #fff;
      line-height: 1.5;
    }

    /* ── Header (identisch index.html) ── */
    .header {
      background: #000;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
    .header-right {
      font-family: 'Verdana', sans-serif;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      user-select: none;
    }
    .view-bar { background: transparent; padding: 0 0 12px 0; margin-top: 0; display: flex; align-items: center; gap: 8px; }
    .view-bar-label { font-family: 'Verdana', sans-serif; font-size: 11px; color: #1a1a1a; white-space: nowrap; }
    .view-btn { padding: 5px 10px; font-family: 'Verdana', sans-serif; font-size: 11px; font-weight: 700; border: 1px solid #1a1a1a; background: transparent; color: #1a1a1a; cursor: pointer; white-space: nowrap; border-radius: 0; }
    .view-btn.active { background: #1a1a1a; color: #fff; }
    .view-btn:hover:not(.active) { opacity: 0.7; }
    .copy-link-text { font-family: 'Verdana', sans-serif; font-size: 11px; color: #555; cursor: pointer; background: none; border: none; padding: 0; }
    .flyout{display:none;position:fixed;background:#fff;border:1px solid #ddd;z-index:150;box-shadow:0 4px 14px rgba(0,0,0,.18);min-width:220px;padding:4px 0;}
    .flyout.open{display:block;}
    .flyout-section-title{padding:8px 14px 4px;font-family:'Verdana',sans-serif;font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.04em;pointer-events:none;}
    .flyout-item{display:block;width:100%;padding:9px 14px;font-family:'Verdana',sans-serif;font-size:12px;text-align:left;background:none;border:none;cursor:pointer;color:#1a1a1a;text-decoration:none;white-space:nowrap;}
    .flyout-item:hover{background:#f0fafd;}
    .flyout-item.active{font-weight:700;}
    .flyout-item.active::before{content:"✓ ";color:#77C5D8;}
    .flyout-sep{height:1px;background:#e0e0e0;margin:4px 0;}

    /* ── Footer (identisch index.html) ── */
    .footer-bar {
      background: #F0F0F0;
      padding: 8px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
    }
    .footer-bar span {
      font-family: 'Verdana', sans-serif;
      font-size: 11px;
      color: #555;
    }

    @media print {
      .header, .footer-bar { display: none !important; }
    }

    /* ── Main layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 88px 20px 52px; }

    /* ── Project summary card ── */
    .summary {
      background: var(--grey);
      border-left: 5px solid var(--cyan);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }
    .summary h1 { font-size: 18px; margin-bottom: 8px; }
    .summary .meta { opacity: 0.65; margin-bottom: 4px; }
    .summary .meta a { color: inherit; }
    .summary .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    .stat {
      background: #fff;
      border: 1px solid var(--border);
      padding: 8px 14px;
      text-align: center;
      min-width: 90px;
    }
    .stat .val { font-size: 22px; font-weight: bold; }
    .stat .lbl { font-size: 11px; opacity: 0.6; margin-top: 2px; }

    /* ── Avg-score ── */
    .avg-score {
      text-align: right;
      position: relative;
      padding: 16px;
      background-color: #f4f4f4;
    }
    .avg-score .big {
      font-size: 56px;
      font-weight: bold;
      line-height: 1;
      position: relative;
      display: inline-block;
      padding: 16px 24px;
    }
    .avg-score .lbl {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
      position: relative;
    }

    /* ── Score colouring ── */
    .score-green   { color: var(--green); }
    .score-cyan    { color: var(--cyan); }
    .score-yellow  { color: var(--yellow); }
    .score-magenta { color: var(--magenta); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-weight: bold;
      font-size: 12px;
      color: #fff;
    }
    .badge-green   { background: var(--green);   color: var(--black); }
    .badge-cyan    { background: var(--cyan);     color: var(--black); }
    .badge-yellow  { background: var(--yellow);   color: var(--black); }
    .badge-magenta { background: var(--magenta); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--black);
      color: #fff;
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: normal;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:hover  { background: #f0fafd; }
    tbody tr.active { background: #e8f7fb; }
    td { padding: 10px 14px; vertical-align: middle; }
    td.url { word-break: break-all; font-size: 12px; }
    td.url a { color: inherit; text-decoration: none; }
    td.url a:hover { text-decoration: underline; }
    td.ts { white-space: nowrap; font-size: 11px; opacity: 0.65; }

    /* ── Detail panel ── */
    .detail-row td {
      padding: 0;
      background: #fafafa;
      border-bottom: 2px solid var(--cyan);
    }
    .detail-inner { padding: 20px 16px; }
    .checks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .kachel-wrap { border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
    .kachel-head { padding: 10px 14px; font-family: 'Verdana', sans-serif; font-size: 13px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: space-between; }
    .kachel-score { font-family: 'Verdana', sans-serif; font-size: 12px; font-weight: 700; opacity: 0.9; }
    .kachel-body { background: #F0F0F0; padding: 0; font-family: 'Verdana', sans-serif; font-size: 12px; color: #000; }
    .kachel-body p { padding: 4px 0; border-bottom: 1px solid #e0e0e0; line-height: 1.5; }
    .kachel-body p:last-child { border-bottom: none; }
    .no-items { font-size: 11px; opacity: 0.45; font-style: italic; }
    .aufgabe-section { padding: 10px 14px; border-bottom: 1px solid #e0e0e0; }
    .aufgabe-section:last-child { border-bottom: none; }
    .aufgabe-action { font-family: 'Verdana', sans-serif; font-size: 12px; color: #000; line-height: 1.6; background: #fff; padding: 8px 10px; border-left: 3px solid #77C5D8; margin-top: 8px; }
    .aufgabe-cta { display: inline-block; margin-top: 10px; padding: 5px 12px; font-family: 'Verdana', sans-serif; font-size: 11px; font-weight: 700; color: #000; border: 1.5px solid #000; text-decoration: none; }
    .aufgabe-cta:hover { background: #000; color: #fff; }
    .issue-list { margin: 6px 0 0 0; list-style: none; }
    .issue-list li { padding: 3px 0; font-family: 'Verdana', sans-serif; font-size: 12px; line-height: 1.6; border-bottom: 1px solid #e8e8e8; }
    .issue-list li:last-child { border-bottom: none; }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.5;
      font-size: 15px;
    }

    /* ── Projektliste (kein ?project=) ── */
    .proj-list-title { font-family:'Verdana',sans-serif; font-size:16px; font-weight:700; color:#000; margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid #1a1a1a; }
    .state-msg { font-family:'Verdana',sans-serif; font-size:13px; color:#777; padding:28px 0; }
    td.url-cell { color:#1a1a1a; font-size:12px; word-break:break-all; }
    .score-badge { display:inline-block; padding:2px 9px; font-weight:700; font-size:12px; color:#fff; }
    .score-green   { background:#ADCA2A; color:#1a1a1a; }
    .score-cyan    { background:#77C5D8; color:#1a1a1a; }
    .score-yellow  { background:#FCC300; color:#1a1a1a; }
    .score-magenta { background:#EE6A87; }
    @media (max-width:768px) {
      .table-wrap table,.table-wrap thead,.table-wrap tbody,.table-wrap th,.table-wrap td,.table-wrap tr{display:block;}
      .table-wrap thead{display:none;}
      .table-wrap tbody tr{border:1px solid var(--border);margin-bottom:10px;padding:12px 14px;cursor:pointer;}
      .table-wrap td{padding:4px 0;border:none;font-size:13px;}
      .table-wrap td[data-label]::before{content:attr(data-label)": ";font-size:11px;color:#777;display:block;margin-bottom:2px;}
      .summary { grid-template-columns: 1fr; }
      .avg-score { text-align: left; }
      .avg-score .big { display: block; text-align: left; }
    }
  </style>
</head>
<body>

<div class="header">
  <img src="frontend/assets/HSLU_Logo_DE_Weiss_rgb.svg" alt="HSLU" style="height:32px;" onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';">
  <div id="logo-fb" style="display:none;align-items:center;gap:10px;">
    <span style="font-family:'Verdana',sans-serif;font-size:24px;font-weight:700;color:#fff;">HSLU</span>
    <span style="font-family:'Verdana',sans-serif;font-size:11px;color:#fff;line-height:1.3;">Hochschule<br>Luzern</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="header-right" onclick="toggleNavFlyout(this)">SEO-Audit Rapport ▾</div>
  </div>
</div>

<!-- ── Flyout: Navigation ── -->
<div class="flyout" id="flyout-nav">
  <div class="flyout-section-title">Navigation</div>
  <a class="flyout-item" href="index.html">SEO-Audit Tool</a>
  <a class="flyout-item" href="projects.html">SEO-Audit Projekte</a>
  <a class="flyout-item active" href="report.html">SEO-Audit Rapport</a>
  <a class="flyout-item" href="spelling.html">SEO-Audit Rechtschreibkandidaten</a>
  <div class="flyout-sep"></div>
  <a class="flyout-item" onclick="logout()" style="cursor:pointer;">Abmelden</a>
</div>

<main>
  <div id="app"><div class="state">Lade Daten…</div></div>
</main>

<div class="footer-bar">
  <span>hslu-seo-audit by DMS</span>
  <span style="position:absolute;left:50%;transform:translateX(-50%);"></span>
  <span id="footer-info"></span>
</div>

<script>
const VERSION='260421-1626';
const API_URL = "http://localhost:8000";
(function(){
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('project');
  const urlToken = params.get('token');
  if (slug) {
    if (urlToken) localStorage.setItem(`project_token_${slug}`, urlToken);
    const token = urlToken || localStorage.getItem(`project_token_${slug}`);
    if (!token) { _showNoAccess(); return; }
    fetch(`${API_URL}/projects/${slug}/token/verify?token=${encodeURIComponent(token)}`)
      .then(r => r.json())
      .then(data => { if (!data.valid) { localStorage.removeItem(`project_token_${slug}`); _showNoAccess(); } })
      .catch(() => {});
  } else {
    if (urlToken) localStorage.setItem('admin_token', urlToken);
    const token = localStorage.getItem('admin_token');
    if (!token) { _showNoAccess(); return; }
    fetch(`${API_URL}/admin/token/verify?token=${encodeURIComponent(token)}`)
      .then(r => r.json())
      .then(data => { if (!data.valid) { localStorage.removeItem('admin_token'); _showNoAccess(); } })
      .catch(() => {});
  }
})();
function _showNoAccess() {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Verdana,sans-serif;font-size:14px;color:#555;text-align:center;padding:40px;">Kein gültiger Zugangslink.<br>Bitte fordere einen Link bei der zuständigen Person an.</div>';
}
function logout(){
  const slug = new URLSearchParams(window.location.search).get('project');
  if (slug) localStorage.removeItem(`project_token_${slug}`);
  else localStorage.removeItem('admin_token');
  location.reload();
}

const EDITOR_CHECKS = new Set(["broken_links", "spelling", "alt_attributes"]);
let currentView = new URLSearchParams(window.location.search).get("view") || "expert";
let _pages = [];

function setView(view) {
  currentView = view;
  const params = new URLSearchParams(window.location.search);
  params.set("view", view);
  history.replaceState(null, "", "?" + params.toString());
  document.getElementById("btn-expert")?.classList.toggle("active", view === "expert");
  document.getElementById("btn-editor")?.classList.toggle("active", view === "editor");
  // Re-render offenes Detail-Panel
  const existingDetail = document.querySelector("tr.detail-row");
  if (existingDetail) {
    const activeTr = document.querySelector("tr[data-idx].active");
    if (activeTr) {
      existingDetail.replaceWith(renderDetail(_pages[parseInt(activeTr.dataset.idx, 10)]));
    }
  }
}


function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const fb = document.getElementById("copy-feedback");
    if (fb) { fb.style.opacity = "1"; setTimeout(() => { fb.style.opacity = "0"; }, 1500); }
  });
}

/* ── Helpers ── */
function scoreClass(s) {
  if (s >= 80) return "green";
  if (s >= 60) return "cyan";
  if (s >= 40) return "yellow";
  return "magenta";
}

function scoreColor(s) {
  if (s >= 99) return "#ADCA2A";
  if (s >= 66) return "#77C5D8";
  if (s >= 33) return "#FCC300";
  return "#EE6A87";
}

function msgText(m) { return typeof m === "object" ? m.message : m; }
function fixMsg(msg) { return msg.replace(/Wird von Google abgeschnitten/gi, "Wird bei der Ausgabe auf klassischen Suchmaschinen abgeschnitten"); }
function linkify(text) { return text.replace(/(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" style="color:inherit;text-decoration:underline;">$1</a>'); }

function badge(score, isError) {
  if (isError) return `<span class="badge" style="background:#aaa;color:#fff;">Fehler</span>`;
  const cls = scoreClass(score);
  return `<span class="badge badge-${cls}">${score.toFixed(1)}</span>`;
}

function bigScore(score) {
  const cls = scoreClass(score);
  return `<div class="big score-${cls}">${score.toFixed(1)}</div>`;
}

function fmtDate(iso) {
  if (!iso) return "—";
  return iso.replace("T", " ").slice(0, 16);
}

const CHECK_LABELS = {
  meta:           "Meta-Texte",
  headings:       "Überschriften",
  broken_links:   "Defekte Links",
  alt_attributes: "Alt-Attribute",
  spelling:       "Rechtschreibung",
  keywords:       "Keywords & Semantik",
  url_slug:       "URL / Slug",
  sea:            "Kampagnen-Check",
  mode_analysis:  "Seitentyp-Analyse",
};
const ANLEITUNG_BASE = "https://hsluzern.sharepoint.com/:u:/r/sites/hslu_intranet_rs_mk/SitePages/SEO.aspx?csf=1&web=1&e=t1yOFs";
const ANLEITUNG_URLS = {
  meta:           ANLEITUNG_BASE + "#meta-texte",
  headings:       ANLEITUNG_BASE + "#%C3%BCberschriften",
  broken_links:   ANLEITUNG_BASE + "#defekte-links",
  alt_attributes: ANLEITUNG_BASE + "#alt-attribute",
  spelling:       ANLEITUNG_BASE + "#rechtschreibung",
  keywords:       ANLEITUNG_BASE + "#keywords-semantik",
  url_slug:       ANLEITUNG_BASE + "#url-slug",
  mode_analysis:  ANLEITUNG_BASE,
};
const AUFGABE_TEXTE = {
  meta: {
    issue:   { action: "Ergänze einen aussagekräftigen Title (30–60 Zeichen) und eine Meta-Description (70–160 Zeichen) direkt im CMS." },
    warning: { action: "Kürze Title oder Description auf die empfohlene Zeichenzahl." },
  },
  headings: {
    issue:   { action: "Stelle sicher, dass die Seite genau eine H1 hat. Weitere Abschnitte mit H2 und H3 strukturieren." },
    warning: { action: "Prüfe die Reihenfolge der Überschriften und fülle fehlende Ebenen auf." },
  },
  broken_links: {
    issue:   { action: "Ersetze oder entferne alle defekten Links. Interne 404-Fehler haben höchste Priorität." },
    warning: { action: "Aktualisiere interne Weiterleitungen direkt auf die Ziel-URL." },
  },
  alt_attributes: {
    issue:   { action: "Ergänze für jedes Bild einen kurzen, beschreibenden Alt-Text im CMS." },
    warning: { action: "Prüfe die aufgelisteten Bilder und ergänze die fehlenden Texte." },
  },
  spelling: {
    issue:   { action: "Korrigiere die gefundenen Fehler direkt im CMS." },
    warning: { action: "Schau die Liste durch und korrigiere echte Fehler im CMS." },
  },
  keywords: {
    issue:   { action: "Verwende die wichtigsten Keywords natürlich im Text, in der H1 und in der Meta-Description." },
    warning: { action: "Überarbeite den Text so, dass Keywords natürlich und in angemessener Häufigkeit vorkommen." },
  },
  url_slug: {
    issue:   { action: "Kürze die URL, entferne Sonderzeichen und Umlaute und halte die Tiefe unter 5 Ebenen." },
    warning: { action: "Passe die URL wenn möglich an – am besten bei der nächsten inhaltlichen Überarbeitung." },
  },
  mode_analysis: {
    issue:   { action: "Ergänze die fehlenden Elemente gemäss der Liste unten." },
    warning: { action: "Ergänze die fehlenden Elemente schrittweise. Die Liste zeigt was konkret fehlt." },
  },
};

/* ── Check-Card (identisch index.html renderAufgaben) ── */
function renderCheckCard(key, data) {
  const label   = CHECK_LABELS[key] || key;
  const score   = typeof data.score === "number" ? data.score : null;
  const hdrBg   = score !== null ? scoreColor(score) : "#1a1a1a";
  const txKey   = AUFGABE_TEXTE[key];
  const anlUrl  = ANLEITUNG_URLS[key] || ANLEITUNG_BASE;

  const issues   = (data.issues   || []).map(m => fixMsg(msgText(m)));
  const warnings = (data.warnings || []).map(m => fixMsg(msgText(m)));
  const infos    = (data.infos    || []).map(m => fixMsg(msgText(m)));
  const passed   = (data.passed   || []).map(m => fixMsg(msgText(m)));

  const w = document.createElement("div");
  w.className = "kachel-wrap";
  w.innerHTML = `<div class="kachel-head" style="background:${hdrBg};">
    <span>${label}</span>
    <span class="kachel-score">Score: ${score !== null ? score : "–"} / 100</span>
  </div>`;

  const body = document.createElement("div");
  body.className = "kachel-body";

  const hasIssue   = issues.length > 0;
  const hasWarning = warnings.length > 0;
  const hasInfo    = infos.length > 0;

  if (!hasIssue && !hasWarning && !hasInfo) {
    const sec = document.createElement("div");
    sec.className = "aufgabe-section";
    sec.innerHTML = `<span style="color:#1b5e20;font-weight:700;">🟢 Keine Probleme gefunden</span>`;
    body.appendChild(sec);
    passed.forEach(p => {
      const sec2 = document.createElement("div");
      sec2.className = "aufgabe-section";
      sec2.innerHTML = `<span style="color:#1b5e20;">🟢 ${p}</span>`;
      body.appendChild(sec2);
    });
  } else {
    [[issues, "issue", "#a00", "🔴"], [warnings, "warning", "#7a5c00", "🟡"], [infos, "info", "#0e7a8a", "●"]].forEach(([msgs, type, col, icon]) => {
      if (!msgs.length) return;
      const txEntry = txKey ? txKey[type] : null;
      const sec = document.createElement("div");
      sec.className = "aufgabe-section";
      const hasLinks = msgs.some(m => m.includes("http"));
      if (hasLinks) {
        msgs.forEach(m => {
          const d = document.createElement("div");
          d.innerHTML = icon + " " + linkify(m);
          d.style.cssText = `font-size:12px;color:${col};padding:2px 0;line-height:1.7;`;
          sec.appendChild(d);
        });
      } else {
        const ul = document.createElement("ul");
        ul.className = "issue-list";
        msgs.forEach(m => {
          const li = document.createElement("li");
          li.style.color = col;
          li.innerHTML = icon + " " + m;
          ul.appendChild(li);
        });
        sec.appendChild(ul);
      }
      if (txEntry) {
        const action = document.createElement("div");
        action.className = "aufgabe-action";
        action.innerHTML = `<strong>Was tun:</strong> ${txEntry.action}`;
        sec.appendChild(action);
      }
      const cta = document.createElement("a");
      cta.className = "aufgabe-cta";
      cta.href = anlUrl;
      cta.target = "_blank";
      cta.textContent = "→ Zur Anleitung";
      sec.appendChild(cta);
      if (key === "spelling") {
        const slug = new URLSearchParams(window.location.search).get("project") || "";
        const ctaSpell = document.createElement("a");
        ctaSpell.className = "aufgabe-cta";
        ctaSpell.href = `spelling.html?project=${encodeURIComponent(slug)}`;
        ctaSpell.style.marginLeft = "8px";
        ctaSpell.textContent = "→ Liste überarbeiten";
        sec.appendChild(ctaSpell);
      }
      body.appendChild(sec);
    });
  }

  // Immer "→ Zur Anleitung" am Ende wenn keine Sections (alles OK)
  if (!hasIssue && !hasWarning && !hasInfo) {
    const sec = document.createElement("div");
    sec.className = "aufgabe-section";
    const cta = document.createElement("a");
    cta.className = "aufgabe-cta";
    cta.href = anlUrl;
    cta.target = "_blank";
    cta.textContent = "→ Zur Anleitung";
    sec.appendChild(cta);
    if (key === "spelling") {
      const slug = new URLSearchParams(window.location.search).get("project") || "";
      const ctaSpell = document.createElement("a");
      ctaSpell.className = "aufgabe-cta";
      ctaSpell.href = `spelling.html?project=${encodeURIComponent(slug)}`;
      ctaSpell.style.marginLeft = "8px";
      ctaSpell.textContent = "→ Liste überarbeiten";
      sec.appendChild(ctaSpell);
    }
    body.appendChild(sec);
  }

  w.appendChild(body);
  return w;
}

/* ── Detail panel ── */
function renderDetail(page) {
  const results = page.results || {};

  const viewBar = document.createElement("div");
  viewBar.className = "view-bar";
  viewBar.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:flex-start;gap:6px;">
      <span class="view-bar-label">Ansicht:</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="view-btn${currentView === 'expert' ? ' active' : ''}" id="btn-expert" onclick="setView('expert')">Expert</button>
        <button class="view-btn${currentView === 'editor' ? ' active' : ''}" id="btn-editor" onclick="setView('editor')">Editor</button>
        <button class="copy-link-text" id="copy-btn" onclick="copyLink()">Link kopieren</button>
        <span id="copy-feedback" style="font-size:11px;color:#555;opacity:0;transition:opacity 0.3s;">Kopiert!</span>
      </div>
    </div>`;

  const inner = document.createElement("div");
  inner.className = "detail-inner";
  inner.appendChild(viewBar);

  if (results.error) {
    const errBox = document.createElement("div");
    errBox.style.cssText = "background:#f4f4f4;border-left:4px solid #aaa;padding:12px 16px;font-size:13px;color:#555;margin-bottom:16px;";
    errBox.textContent = "⚠ Diese Seite konnte nicht vollständig analysiert werden (Timeout). Bitte manuell prüfen.";
    inner.appendChild(errBox);
  } else {
    const grid = document.createElement("div");
    grid.className = "checks-grid";
    Object.entries(results)
      .filter(([k]) => currentView === "expert" || EDITOR_CHECKS.has(k))
      .sort((a, b) => (a[1].score ?? 100) - (b[1].score ?? 100))
      .forEach(([k, v]) => grid.appendChild(renderCheckCard(k, v)));
    inner.appendChild(grid);
  }
  const td = document.createElement("td");
  td.colSpan = 3;
  td.appendChild(inner);
  const tr = document.createElement("tr");
  tr.className = "detail-row";
  tr.appendChild(td);
  return tr;
}

/* ── Main render ── */
function render(data) {
  const project = data.project;
  // Tabelle aufsteigend nach Score sortieren (schlechtester zuerst)
  const pages = [...data.pages].sort((a, b) => (a.score ?? 0) - (b.score ?? 0));
  _pages = pages; // global für Re-Render bei View-Wechsel

  const scores = pages.map(p => p.score).filter(s => typeof s === "number");
  const avg    = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;

  const slug = new URLSearchParams(window.location.search).get("project") || "";
  const summaryHtml = `
    <div class="summary">
      <div>
        <h1>${project.name}</h1>
        <div class="meta"><a href="${project.root_url}" target="_blank">${project.root_url}</a></div>
        <div class="meta">Letzter Crawl: ${fmtDate(project.last_crawled_at)}</div>
        <div class="stats">
          <div class="stat"><div class="val">${pages.length}</div><div class="lbl">Seiten auditiert</div></div>
          <div class="stat"><div class="val">${project.page_type || "–"}</div><div class="lbl">Seitentyp</div></div>
          <div class="stat"><div class="val">${project.language || "–"}</div><div class="lbl">Sprache</div></div>
        </div>
      </div>
      <div class="avg-score">
        ${bigScore(avg)}
        <div class="lbl">Durchschnittlicher Score</div>
      </div>
    </div>`;

  const rows = pages.map((page, idx) => `
    <tr data-idx="${idx}">
      <td class="url"><a href="${page.url}" target="_blank" onclick="event.stopPropagation()">${page.url}</a></td>
      <td>${badge(page.score, page.results?.error)}</td>
      <td class="ts">${fmtDate(page.crawled_at)}</td>
    </tr>`).join("");

  const tableHtml = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>URL</th>
            <th>Score ↑</th>
            <th>Auditiert am</th>
          </tr>
        </thead>
        <tbody id="page-rows">${rows}</tbody>
      </table>
    </div>`;

  document.getElementById("app").innerHTML = summaryHtml + tableHtml;

  /* ── Row click → detail ── */
  let openIdx = null;
  document.getElementById("page-rows").addEventListener("click", e => {
    const tr = e.target.closest("tr[data-idx]");
    if (!tr) return;
    const idx = parseInt(tr.dataset.idx, 10);

    const existing = document.querySelector("tr.detail-row");
    if (existing) existing.remove();

    const wasOpen = openIdx === idx;
    document.querySelectorAll("tr.active").forEach(r => r.classList.remove("active"));
    openIdx = null;

    if (!wasOpen) {
      tr.classList.add("active");
      tr.insertAdjacentElement("afterend", renderDetail(pages[idx]));
      openIdx = idx;
    }
  });
}

/* ── Score helpers (Projektliste) ── */
function scoreClass(s) {
  if (s === null || s === undefined) return null;
  if (s >= 99) return "green";
  if (s >= 66) return "cyan";
  if (s >= 33) return "yellow";
  return "magenta";
}
function scoreBadge(s) {
  if (s === null || s === undefined) return '<span style="color:#aaa;font-size:12px;">—</span>';
  const cls = scoreClass(s);
  return `<span class="score-badge score-${cls}">${s.toFixed(1)}</span>`;
}
function fmtDate(iso) {
  if (!iso) return "—";
  return iso.replace("T", " ").slice(0, 16);
}

/* ── Nav flyout ── */
function toggleNavFlyout(btn) {
  const flyout = document.getElementById("flyout-nav");
  const isOpen = flyout.classList.contains("open");
  flyout.classList.toggle("open", !isOpen);
  if (!isOpen) {
    const rect = btn.getBoundingClientRect();
    flyout.style.right = (window.innerWidth - rect.right) + "px";
    flyout.style.left = "auto";
    flyout.style.top = (rect.bottom + 4) + "px";
  }
}
document.addEventListener("click", e => {
  if (!e.target.closest(".header-right") && !e.target.closest("#flyout-nav"))
    document.getElementById("flyout-nav").classList.remove("open");
});

/* ── Boot ── */
(async () => {
  document.getElementById("footer-info").textContent = "Beta v" + VERSION;

  const params = new URLSearchParams(window.location.search);
  const slug   = params.get("project");

  if (!slug) {
    document.title = "SEO-Audit Rapport – Projekte";
    const app = document.getElementById("app");
    app.innerHTML = `<div class="state-msg">Lade Projekte…</div>`;
    try {
      const res = await fetch(`${API_URL}/projects/`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const projects = await res.json();
      if (!projects.length) {
        app.innerHTML = `<div class="state-msg">Noch keine Projekte vorhanden.</div>`;
        return;
      }
      // Enrichment: Seitenanzahl + Ø Score aus Report-Daten
      const enriched = await Promise.all(projects.map(async p => {
        try {
          const r = await fetch(`${API_URL}/projects/${p.slug}/report`);
          if (!r.ok) return { ...p, page_count: 0, avg_score: null };
          const data = await r.json();
          const pages = data.pages || [];
          const scores = pages.map(pg => pg.score).filter(s => typeof s === "number");
          const avg = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : null;
          return { ...p, page_count: pages.length, avg_score: avg !== null ? Math.round(avg * 10) / 10 : null };
        } catch { return { ...p, page_count: 0, avg_score: null }; }
      }));
      const rows = enriched.map(p => `
        <tr data-slug="${p.slug}" onclick="window.location.href='report.html?project=${p.slug}'" style="cursor:pointer;">
          <td data-label="Projektname"><strong>${p.name}</strong></td>
          <td class="url-cell" data-label="Root-URL">${p.root_url}</td>
          <td data-label="Seiten">${p.page_count || "—"}</td>
          <td data-label="Ø Score">${scoreBadge(p.avg_score)}</td>
          <td class="ts" data-label="Letzter Audit">${fmtDate(p.last_crawled_at)}</td>
        </tr>`).join("");
      app.innerHTML = `
        <div class="proj-list-title">Projekte</div>
        <div class="table-wrap"><table>
          <thead><tr>
            <th>Projektname</th><th>Root-URL</th><th>Seiten</th><th>Ø Score</th><th>Letzter Audit</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
    } catch(err) {
      app.innerHTML = `<div class="state-msg">Fehler beim Laden der Projekte: ${err.message}</div>`;
    }
    return;
  }

  document.title = `SEO Report – ${slug}`;

  try {
    const res = await fetch(`${API_URL}/projects/${slug}/report`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (!data.pages || data.pages.length === 0) {
      document.getElementById("app").innerHTML =
        `<div class="state">Keine Audit-Ergebnisse für «${slug}» gefunden. Bitte zuerst Crawl und Audit starten.</div>`;
      return;
    }

    render(data);
    setView(currentView);
  } catch (err) {
    document.getElementById("app").innerHTML =
      `<div class="state">Fehler beim Laden der Daten: ${err.message}</div>`;
  }
})();
</script>
</body>
