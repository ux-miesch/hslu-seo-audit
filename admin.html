<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO-Audit Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0; }
    :root { --black: #1a1a1a; --cyan: #77C5D8; --border: #e0e0e0; --grey: #f4f4f4; }
    body { font-family: Verdana, Geneva, sans-serif; font-size: 13px; color: var(--black); background: #fff; line-height: 1.5; }

    .header { background: #000; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .header-right { font-family: 'Verdana', sans-serif; font-size: 13px; color: #ccc; }
    .footer-bar { background: #F0F0F0; border-top: 1px solid #ddd; font-family: 'Verdana', sans-serif; font-size: 11px; color: #777; height: 36px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }

    main { max-width: 900px; margin: 0 auto; padding: 88px 20px 52px; }

    /* Login */
    .login-box { max-width: 360px; margin: 60px auto; background: var(--grey); padding: 32px; border-left: 4px solid var(--cyan); }
    .login-box h2 { font-size: 15px; margin-bottom: 16px; }
    .login-box input { width: 100%; padding: 9px 12px; font-family: Verdana, sans-serif; font-size: 13px; border: 1px solid #bbb; margin-bottom: 12px; }
    .login-box input:focus { outline: none; border-color: var(--cyan); }
    .btn { padding: 8px 18px; font-family: Verdana, sans-serif; font-size: 12px; font-weight: 700; background: var(--black); color: #fff; border: none; cursor: pointer; }
    .btn:hover { opacity: 0.85; }
    .btn-outline { background: transparent; color: var(--black); border: 1.5px solid var(--black); }
    .btn-danger { background: transparent; color: #c00; border: 1.5px solid #c00; font-size: 11px; padding: 4px 10px; }
    .btn-danger:hover { background: #fde8e8; opacity: 1; }
    .login-error { color: #c00; font-size: 12px; margin-top: 8px; display: none; }

    /* Token table */
    h1 { font-size: 18px; margin-bottom: 24px; }
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #777; margin: 32px 0 12px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: var(--black); color: #fff; text-align: left; padding: 9px 14px; font-size: 12px; font-weight: normal; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: #f0fafd; }
    td { padding: 10px 14px; vertical-align: middle; }
    td.token-val { font-family: monospace; font-size: 12px; color: #555; }
    .badge-count { display: inline-block; background: var(--cyan); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; min-width: 28px; text-align: center; }
    .empty-state { color: #aaa; font-size: 13px; padding: 20px 0; }

    /* New token form */
    .new-token-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 16px; flex-wrap: wrap; }
    .new-token-row label { font-size: 11px; font-weight: 700; display: block; margin-bottom: 4px; }
    .new-token-row input { padding: 8px 12px; font-family: Verdana, sans-serif; font-size: 13px; border: 1px solid #bbb; width: 220px; }
    .new-token-row input:focus { outline: none; border-color: var(--cyan); }

    .share-btn { background: none; border: 1.5px solid var(--black); cursor: pointer; font-family: Verdana, sans-serif; font-size: 11px; font-weight: 700; color: var(--black); padding: 4px 10px; white-space: nowrap; }
    .share-btn:hover { background: var(--black); color: #fff; }

    .logout-link { font-size: 11px; color: #555; cursor: pointer; background: none; border: none; font-family: Verdana, sans-serif; }
    .logout-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="frontend/assets/HSLU_Logo_DE_Weiss_rgb.svg" alt="HSLU" style="height:32px;" onerror="this.style.display='none'">
  </div>
  <div class="header-right">SEO-Audit Admin</div>
</div>

<div class="footer-bar">
  <span>hslu-seo-audit by DMS</span>
  <span id="footer-info"></span>
</div>

<!-- Login -->
<div id="login-view">
  <div class="login-box">
    <h2>Admin-Zugang</h2>
    <input type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Anmelden</button>
    <div class="login-error" id="login-error">Falsches Passwort.</div>
  </div>
</div>

<!-- Main view -->
<div id="admin-view" style="display:none;">
  <main>
    <h1>Zugang verwalten</h1>

    <div class="section-title">Admin-Token</div>
    <p style="font-size:12px;color:#555;line-height:1.6;margin-bottom:18px;">Der Admin-Token ermöglicht Zugang zu SEO-Audit Projekte. Teile den generierten Link mit berechtigten Personen.</p>
    <div style="font-family:monospace;font-size:13px;margin-bottom:16px;">
      Aktueller Token: <span id="admin-token-masked" style="color:#555;">Wird geladen…</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" onclick="generateAdminToken()">Neuen Admin-Token generieren</button>
      <button class="btn btn-outline" onclick="copyAdminLink()">Link kopieren</button>
    </div>
    <div id="admin-token-feedback" style="font-size:12px;color:#555;margin-top:10px;min-height:18px;"></div>
  </main>
</div>

<script>
const VERSION = '1.0.0';
const API = "http://localhost:8000";
const BASE_URL = "https://ux-miesch.github.io/hslu-seo-audit";

let _adminPw = '';
let _adminToken = null;

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  fetch(`${API}/admin/login`, { method: 'POST', headers: { 'X-Admin-Password': pw } })
    .then(r => {
      if (r.ok) {
        _adminPw = pw;
        sessionStorage.setItem('admin_pw', pw);
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = '';
        loadAdminToken();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    })
    .catch(() => { document.getElementById('login-error').textContent = 'Backend nicht erreichbar.'; document.getElementById('login-error').style.display = 'block'; });
}

function adminFetch(path, opts = {}) {
  return fetch(`${API}${path}`, {
    ...opts,
    headers: { 'X-Admin-Password': _adminPw, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
}

function loadAdminToken() {
  adminFetch('/admin/token')
    .then(r => r.json())
    .then(data => {
      _adminToken = data.token;
      document.getElementById('admin-token-masked').textContent = data.masked || '(noch kein Token)';
    })
    .catch(() => { document.getElementById('admin-token-masked').textContent = 'Fehler beim Laden.'; });
}

function generateAdminToken() {
  adminFetch('/admin/token', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      _adminToken = data.token;
      document.getElementById('admin-token-masked').textContent = data.masked;
      showFeedback('Neuer Token generiert.');
    })
    .catch(() => alert('Fehler beim Generieren.'));
}

function copyAdminLink() {
  if (!_adminToken) { showFeedback('Kein Token vorhanden. Bitte zuerst generieren.'); return; }
  const url = `${BASE_URL}/projects.html?token=${_adminToken}`;
  navigator.clipboard.writeText(url);
  showFeedback('Link kopiert!');
}

function showFeedback(msg) {
  const fb = document.getElementById('admin-token-feedback');
  fb.textContent = msg;
  setTimeout(() => { fb.textContent = ''; }, 2500);
}

// Auto-login from sessionStorage
const savedPw = sessionStorage.getItem('admin_pw');
if (savedPw) {
  _adminPw = savedPw;
  fetch(`${API}/admin/login`, { method: 'POST', headers: { 'X-Admin-Password': savedPw } })
    .then(r => {
      if (r.ok) {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = '';
        loadAdminToken();
      } else {
        sessionStorage.removeItem('admin_pw');
      }
    }).catch(() => {});
}

document.getElementById('footer-info').textContent = 'Admin v' + VERSION;
</script>
</body>
</html>
