<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>SEO Audit – Testoberfläche</title>
  <style>
    body { font-family: monospace; max-width: 860px; margin: 40px auto; padding: 0 20px; background: #0f0f0f; color: #e0e0e0; }
    h1 { color: #7effc0; }
    input { width: 100%; padding: 10px; font-size: 16px; background: #1e1e1e; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 10px 24px; background: #7effc0; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; }
    button:hover { background: #5de8a8; }
    #result { margin-top: 30px; }
    .check-block { background: #1a1a1a; border-left: 3px solid #444; padding: 14px 18px; margin-bottom: 16px; border-radius: 4px; }
    .check-block h2 { margin: 0 0 10px; color: #7effc0; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .score { font-size: 22px; font-weight: bold; }
    .issue   { color: #ff6b6b; }
    .warning { color: #ffd93d; }
    .passed  { color: #7effc0; }
    .info    { color: #aaa; font-size: 13px; margin-top: 6px; word-break: break-all; }
    pre { background: #111; padding: 12px; overflow-x: auto; font-size: 12px; }
    #loading { display: none; color: #888; margin-top: 16px; }
  </style>
</head>
<body>

<h1>🔍 SEO Audit</h1>
<p style="color:#888">Testoberfläche – nur Logik, kein Design</p>

<input type="text" id="url" placeholder="https://example.com" value="" />
<br>
<input type="text" id="keywords" placeholder="Keywords (kommagetrennt, optional)" style="margin-top:8px" />
<br>
<button onclick="runAudit()">Audit starten</button>

<div id="loading">⏳ Seite wird analysiert…</div>
<div id="result"></div>

<script>
  const API = "http://localhost:8000";  // lokal – später Render-URL

  async function runAudit() {
    const url = document.getElementById("url").value.trim();
    const kwRaw = document.getElementById("keywords").value.trim();
    const keywords = kwRaw ? kwRaw.split(",").map(k => k.trim()) : [];

    if (!url) { alert("Bitte eine URL eingeben."); return; }

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerHTML = "";

    try {
      const res = await fetch(`${API}/audit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, keywords }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Unbekannter Fehler");
      }

      const data = await res.json();
      renderResult(data);
    } catch (e) {
      document.getElementById("result").innerHTML =
        `<p class="issue">❌ Fehler: ${e.message}</p>`;
    } finally {
      document.getElementById("loading").style.display = "none";
    }
  }

  function renderResult(data) {
    let html = `<h2 style="color:#aaa">Ergebnis für: <span style="color:#fff">${data.url}</span></h2>`;

    for (const [checkName, check] of Object.entries(data.checks)) {
      const label = { meta: "Meta-Texte", headings: "Überschriftenstruktur" }[checkName] || checkName;
      html += `<div class="check-block">`;
      html += `<h2>${label} <span class="score">${check.score}/100</span></h2>`;

      for (const item of check.issues) {
        html += `<p class="issue">🔴 [${item.severity.toUpperCase()}] ${item.message}</p>`;
        if (item.value) html += `<div class="info">${item.value}</div>`;
      }
      for (const item of check.warnings) {
        html += `<p class="warning">🟡 ${item.message}</p>`;
        if (item.value) html += `<div class="info">${item.value}</div>`;
      }
      for (const item of check.passed) {
        html += `<p class="passed">✅ ${item.message}</p>`;
      }

      // Rohdaten ausklappbar
      html += `<details style="margin-top:10px"><summary style="cursor:pointer;color:#666">Rohdaten</summary>`;
      html += `<pre>${JSON.stringify(check.data, null, 2)}</pre></details>`;
      html += `</div>`;
    }

    document.getElementById("result").innerHTML = html;
  }

  // Enter-Taste
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") runAudit();
  });
</script>

</body>
</html>
