services:
  - type: web
    name: seo-audit-api
    runtime: python
    region: frankfurt  # EU-Region – näher an der Schweiz
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
